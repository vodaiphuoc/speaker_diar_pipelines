name: CI

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: "0 18 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  workflow-lint:
    name: GitHub Actions workflow lint
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Run actionlint
        uses: docker://rhysd/actionlint:1.7.12
        with:
          args: -color

  onnx-tests:
    name: ONNX CPU tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build ONNX test image
        run: |
          docker build \
            --file docker/Dockerfile_onnx_cpu \
            --tag speaker-diar-onnx-tests:${{ github.sha }} \
            .

      - name: Run ONNX tests
        run: docker run --rm speaker-diar-onnx-tests:${{ github.sha }}

  nemotron-calibration:
    name: Native NeMo versus ONNX calibration on Modal
    runs-on: ubuntu-latest
    timeout-minutes: 300
    env:
      MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
      MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Modal client
        run: python -m pip install --upgrade pip modal

      - name: Run Modal GPU calibration
        run: |
          set -o pipefail
          mkdir -p ci-logs
          trap 'if [[ -f ci-logs/modal.log && ! -f ci-logs/calibration.log ]]; then cp ci-logs/modal.log ci-logs/calibration.log; fi' EXIT
          if [[ -z "${MODAL_TOKEN_ID}" || -z "${MODAL_TOKEN_SECRET}" ]]; then
            {
              echo "Skipping Modal calibration because MODAL_TOKEN_ID or MODAL_TOKEN_SECRET is not configured."
              echo "Configure GitHub Actions secrets to enable the GPU calibration job."
            } | tee ci-logs/calibration.log
            exit 0
          fi
          modal run scripts/ci/run_modal_asr_calibration.py \
            2>&1 | tee ci-logs/modal.log

      - name: Upload calibration logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nemotron-calibration-logs-${{ github.run_id }}
          path: ci-logs/
          if-no-files-found: ignore
          retention-days: 7
