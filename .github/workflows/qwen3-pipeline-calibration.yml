name: Qwen3 Pipeline Calibration

on:
  pull_request:
    branches:
      - qwen_asr
  push:
    branches:
      - qwen_asr

permissions:
  contents: read

concurrency:
  group: qwen3-pipeline-calibration-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  export-diarization-artifacts:
    name: Export latest diarization ONNX artifacts
    runs-on: ubuntu-latest
    environment: TEST-CI-GPU
    timeout-minutes: 300
    env:
      MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
      MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}
      MODAL_PIPELINE_CALIBRATION_VOLUME: speaker_diar_ci_pipeline_qwen3_calibration
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Modal client
        run: python -m pip install --upgrade pip modal

      - name: Ensure pipeline calibration Modal volume exists
        run: |
          set -euo pipefail
          if [[ -z "${MODAL_TOKEN_ID}" || -z "${MODAL_TOKEN_SECRET}" ]]; then
            echo "Skipping Modal volume creation because Modal secrets are not configured."
            exit 0
          fi
          if ! output="$(modal volume create "${MODAL_PIPELINE_CALIBRATION_VOLUME}" 2>&1)"; then
            echo "${output}"
            if grep -qi "exist" <<<"${output}"; then
              echo "Volume ${MODAL_PIPELINE_CALIBRATION_VOLUME} already exists; continuing."
            else
              exit 1
            fi
          else
            echo "${output}"
          fi

      - name: Export latest diarization ONNX artifacts
        run: |
          set -o pipefail
          mkdir -p ci-logs
          if [[ -z "${MODAL_TOKEN_ID}" || -z "${MODAL_TOKEN_SECRET}" ]]; then
            echo "Skipping diarization export because Modal secrets are not configured."
            exit 0
          fi
          DIAR_EXPORT_VOLUME_NAME="${MODAL_PIPELINE_CALIBRATION_VOLUME}" \
            modal run exports/diar.py \
            2>&1 | tee ci-logs/diar-export.log

      - name: Upload diarization export logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qwen3-pipeline-diar-export-logs-${{ github.run_id }}
          path: ci-logs/
          if-no-files-found: ignore
          retention-days: 7

  qwen3-pipeline-calibration:
    name: Sortformer ONNX plus Qwen3-ASR pipeline calibration on Modal (${{ matrix.alignment_mode }})
    needs: export-diarization-artifacts
    runs-on: ubuntu-latest
    environment: TEST-CI-GPU
    timeout-minutes: 300
    strategy:
      fail-fast: false
      matrix:
        alignment_mode:
          - diarization_timeline
          - asr_timeline
    env:
      MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
      MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}
      MODAL_PIPELINE_CALIBRATION_VOLUME: speaker_diar_ci_pipeline_qwen3_calibration
      PIPELINE_ALIGNMENT_MODE: ${{ matrix.alignment_mode }}
      PIPELINE_ASR_BACKEND: qwen3_modal
      MODAL_CALIBRATION_GPU: L4:2
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Modal client
        run: python -m pip install --upgrade pip modal

      - name: Ensure pipeline calibration Modal volume exists
        run: |
          set -euo pipefail
          if [[ -z "${MODAL_TOKEN_ID}" || -z "${MODAL_TOKEN_SECRET}" ]]; then
            echo "Skipping Modal volume creation because Modal secrets are not configured."
            exit 0
          fi
          if ! output="$(modal volume create "${MODAL_PIPELINE_CALIBRATION_VOLUME}" 2>&1)"; then
            echo "${output}"
            if grep -qi "exist" <<<"${output}"; then
              echo "Volume ${MODAL_PIPELINE_CALIBRATION_VOLUME} already exists; continuing."
            else
              exit 1
            fi
          else
            echo "${output}"
          fi

      - name: Run Modal GPU pipeline calibration
        run: |
          set -o pipefail
          mkdir -p ci-logs
          trap 'if [[ -f ci-logs/modal-pipeline.log && ! -f ci-logs/pipeline_calibration.log ]]; then cp ci-logs/modal-pipeline.log ci-logs/pipeline_calibration.log; fi' EXIT
          if [[ -z "${MODAL_TOKEN_ID}" || -z "${MODAL_TOKEN_SECRET}" ]]; then
            {
              echo "Skipping Modal pipeline calibration (${PIPELINE_ALIGNMENT_MODE}) because MODAL_TOKEN_ID or MODAL_TOKEN_SECRET is not configured."
              echo "Configure GitHub Actions secrets to enable the GPU pipeline calibration job."
            } | tee ci-logs/pipeline_calibration.log
            exit 0
          fi
          modal run scripts/ci/run_modal_pipeline_calibration.py \
            2>&1 | tee ci-logs/modal-pipeline.log

      - name: Upload pipeline calibration logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qwen3-pipeline-calibration-${{ matrix.alignment_mode }}-logs-${{ github.run_id }}
          path: ci-logs/
          if-no-files-found: ignore
          retention-days: 7
